name: ai-ci

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      # Docker 빌드 속도를 위한 빌드업 설정 (캐싱 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # Build and Push (캐시 적용으로 재빌드 시 매우 빠름)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/project-01-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # K8s 매니페스트 레포지토리 업데이트
      - name: Checkout kustomize repository
        uses: actions/checkout@v4
        with:
          repository: ibm3-Peachtree/k8s-manifest-repo
          ref: master
          token: "${{ secrets.ACTION_TOKEN }}"
          path: k8s-repo

      - name: Update image tag using Kustomize
        run: |
          cd k8s-repo/ai
          kustomize edit set image ${{ secrets.DOCKER_USER }}/project-01-ai=${{ secrets.DOCKER_USER }}/project-01-ai:${{ github.sha }}

      - name: Commit and Push changes
        run: |
          cd k8s-repo
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "chore: update ai image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push origin master